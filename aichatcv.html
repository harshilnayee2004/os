<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ask Harshil — Full Stack Developer (MERN) · AI & GenAI Integration</title>
<meta name="description" content="Harshil Nayee — ask about his work, stack, or availability.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  :root{
    --bg:#FAFAFB;
    --ink:#11131A;
    --ink-soft:#5B5F6B;
    --border:#E7E8EC;
    --accent:#5B4FE0;
    --accent-wash:#EFEDFC;
    --user-bubble:#F1F2F5;
    --live:#1F9D55;

    --f:'Inter', sans-serif;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition-duration:0.001ms !important; }
  }

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--f);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; }

  /* ============ TOP BAR ============ */
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    padding:18px 24px;
    border-bottom:1px solid var(--border);
    flex:none;
  }
  .brand{ font-weight:700; font-size:0.95rem; }
  .topbar-right{ display:flex; align-items:center; gap:16px; }
  .avail{
    display:inline-flex; align-items:center; gap:7px;
    font-size:0.78rem; color:var(--live);
    background:rgba(31,157,85,0.08);
    padding:5px 11px; border-radius:20px;
  }
  .avail .dot{ width:6px; height:6px; border-radius:50%; background:var(--live); }
  .topbar a.mail{ font-size:0.8rem; color:var(--ink-soft); }
  .topbar a.mail:hover{ color:var(--accent); }

  /* ============ MAIN STAGE ============ */
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    max-width:680px;
    width:100%;
    margin:0 auto;
    padding:0 20px;
  }

  .intro{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 0;
    transition:opacity 0.3s ease, transform 0.3s ease;
  }
  .intro.hidden{ display:none; }
  .intro h1{
    font-size:clamp(1.8rem,4.4vw,2.6rem);
    font-weight:800;
    letter-spacing:-0.015em;
  }
  .intro p{ margin-top:10px; font-size:0.95rem; color:var(--ink-soft); }
  .intro .avatar{
    width:46px; height:46px; border-radius:50%;
    background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:1rem;
    margin-bottom:18px;
  }

  /* ============ THREAD ============ */
  .thread{
    flex:1;
    overflow-y:auto;
    padding:24px 0 12px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .bubble-row{ display:flex; gap:10px; align-items:flex-start; }
  .bubble-row.user{ justify-content:flex-end; }
  .avatar-sm{
    width:28px; height:28px; border-radius:50%; flex:none;
    background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:0.72rem;
  }
  .bubble{
    max-width:78%;
    padding:12px 16px;
    border-radius:14px;
    font-size:0.92rem;
    line-height:1.55;
  }
  .bubble.user{ background:var(--user-bubble); color:var(--ink); border-radius:14px 14px 4px 14px; }
  .bubble.assistant{ background:var(--accent-wash); color:var(--ink); border-radius:14px 14px 14px 4px; }
  .bubble.assistant .cursor{
    display:inline-block; width:7px; height:1em; background:var(--accent);
    margin-left:2px; vertical-align:-2px;
    animation:blink 0.9s steps(2) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .typing-dots{ display:inline-flex; gap:4px; padding:4px 2px; }
  .typing-dots span{
    width:6px; height:6px; border-radius:50%; background:var(--accent);
    opacity:0.4;
    animation:tdot 1s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2){ animation-delay:0.15s; }
  .typing-dots span:nth-child(3){ animation-delay:0.3s; }
  @keyframes tdot{ 0%,100%{ opacity:0.3; transform:translateY(0); } 50%{ opacity:1; transform:translateY(-3px); } }

  .stat-line{
    margin-top:8px; font-size:0.8rem; color:var(--ink-soft);
    font-weight:500;
  }
  .stat-line b{ color:var(--accent); }
  .tag-row{ margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; }
  .tag{ font-size:0.74rem; color:var(--accent); background:#fff; border:1px solid var(--border); padding:3px 9px; border-radius:5px; }

  .summary-card{
    margin-top:10px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px 20px;
    font-size:0.86rem;
  }
  .summary-card .srow{ display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px dashed var(--border); }
  .summary-card .srow:last-child{ border-bottom:none; }
  .summary-card .slabel{ color:var(--ink-soft); flex:none; min-width:110px; }
  .summary-card .sval{ color:var(--ink); text-align:right; }

  /* ============ COMPOSER ============ */
  .composer{ flex:none; padding:14px 0 26px; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .chip{
    font-size:0.82rem; color:var(--ink);
    background:#fff;
    border:1px solid var(--border);
    padding:8px 14px; border-radius:20px;
    transition:border-color 0.15s ease, color 0.15s ease;
  }
  .chip:hover{ border-color:var(--accent); color:var(--accent); }

  #askForm{
    display:flex; align-items:center; gap:8px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:24px;
    padding:6px 8px 6px 18px;
    box-shadow:0 2px 10px rgba(17,19,26,0.04);
  }
  #askInput{
    flex:1; border:none; outline:none; font-family:var(--f);
    font-size:0.92rem; color:var(--ink); background:transparent;
    padding:10px 0;
  }
  #askInput::placeholder{ color:#9CA0AB; }
  #askForm button{
    width:36px; height:36px; border-radius:50%;
    background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:1rem; flex:none;
    transition:opacity 0.15s ease;
  }
  #askForm button:hover{ opacity:0.88; }

  a:focus-visible, button:focus-visible, input:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  @media (max-width:600px){
    .topbar{
      padding:14px 16px;
      gap:10px;
      flex-wrap:wrap;
    }
    .topbar-right{
      gap:10px;
      width:100%;
      justify-content:space-between;
    }
    .bubble{ max-width:88%; }
    .summary-card .srow{
      flex-direction:column;
      gap:2px;
    }
    .summary-card .sval{ text-align:left; }
    #askInput{ font-size:16px; }
    .composer{ padding-bottom: max(18px, env(safe-area-inset-bottom, 0px)); }
  }

</style>
</head>
<body>

  <div class="topbar">
    <span class="brand">Harshil Nayee</span>
    <div class="topbar-right">
      <span class="avail"><span class="dot"></span>Open to internships</span>
      <a class="mail" href="mailto:harshilnayee2004@gmail.com">Email</a>
    </div>
  </div>

  <main>
    <div class="intro" id="intro">
      <div class="avatar">H</div>
      <h1>Ask me anything.</h1>
      <p>Full Stack Developer (MERN) · AI &amp; GenAI Integration · Ahmedabad, Gujarat</p>
    </div>

    <div class="thread" id="thread"></div>

    <div class="composer">
      <div class="chips" id="chips"></div>
      <form id="askForm">
        <input id="askInput" placeholder="Ask about my work, stack, or availability…" autocomplete="off">
        <button type="submit" aria-label="Send">→</button>
      </form>
    </div>
  </main>

<script>
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const QA = {
    built: {
      q:"What have you built?",
      a:"Mostly real things for real clients. A health-checkup management system for a medical center (**Aster Medcare**), a rebuilt fast static site with **WhatsApp deep-link purchasing** for a food products brand, and venue marketplace strategy (**Venme.in**).",
      next:["aster","stack"]
    },
    aster: {
      q:"Tell me about Aster Medcare",
      a:"A health checkup management system for a medical center. Built with **React/Vite, Node/Express, and MongoDB**. Handles **500+ daily checkups**. Shipped features like a **custom PDF generation engine**, CR-80 ID generator with QR, and a staged multi-sheet Excel bulk import. I also led a security audit, adding brute-force rate limiting and migrating plaintext government ID storage to **AES-256-GCM encryption**.",
      stat:"<b>500+</b> daily checkups · <b>15+</b> staff users · <b>24</b> dynamic forms",
      tags:["React","Node.js","MongoDB","Cloudflare R2"],
      next:["stack","ai"]
    },
    stack: {
      q:"What's your tech stack?",
      a:"**Frontend**: React.js, Next.js, Angular, HTML5, CSS3, JavaScript (ES6+), Tailwind CSS, jQuery.<br><br>**Backend**: Node.js, Express.js, REST APIs, Socket.io, MongoDB, Mongoose, JWT/RBAC.<br><br>**Cloud/DevOps**: Vercel, Render, AWS Lightsail, Cloudflare R2, MongoDB Atlas, Docker, GitHub Actions.<br><br>**AI/Tools**: Gemini API, Prompt Engineering, Python.",
      next:["ai","intern"]
    },
    ai: {
      q:"Why full-stack + AI?",
      a:"Because most clients don't just need a website — they need the busywork gone. I build the product in **MERN**, then wire in **Gemini API integrations** or **LLM-powered automation** so it actually saves them time, not just looks good.",
      next:["built","education"]
    },
    intern: {
      q:"Are you open to internships?",
      a:"Yes — open to full-time roles and internships. Based in Ahmedabad, open to remote work.",
      next:["contact"]
    },
    education: {
      q:"What's your education?",
      a:"**B.Tech, Computer Science Engineering** at Ganpat University, Gujarat — expected 2027, currently in 7th semester. Plus a handful of certifications: **CCNA**, **Docker Essentials**, **Java Fundamentals**, **Python** (DataCamp + Cisco), and Cisco's **Modern AI track**.",
      next:["contact"]
    },
    contact: {
      q:"How do I reach you?",
      a:"Email is fastest — **harshilnayee2004@gmail.com**. Also reachable on LinkedIn and GitHub, links below.",
      next:["everything"]
    },
    everything: {
      q:"Show me everything",
      a:"Here's the condensed version:",
      summary:true,
      next:[]
    },
    greeting: {
      q:"Hello!",
      a:"Hello there! 👋 I'm Harshil's AI assistant. Ask me anything about my **MERN stack development**, client projects like **Aster Medcare**, or **internship availability**! Choose one of the options below or type your own question.",
      next:["built","stack","intern","contact"]
    }
  };

  const KEYWORDS = [
    { id:'aster', keys:['aster','medcare','checkup','health'] },
    { id:'stack', keys:['stack','tech','technology','language','framework'] },
    { id:'ai', keys:['ai','genai','gemini','llm','automation'] },
    { id:'intern', keys:['intern','full-time','full time','job','hire','available','availability'] },
    { id:'education', keys:['education','degree','university','college','cert'] },
    { id:'contact', keys:['contact','email','phone','reach','linkedin','github'] },
    { id:'built', keys:['built','build','project','work','made','done'] },
    { id:'everything', keys:['everything','resume','cv','summary','all'] },
    { id:'greeting', keys:['hi','hello','hey','greetings','hola','sup','yo','morning','afternoon','evening'] }
  ];

  function formatMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code>$1</code>');
  }

  const thread = document.getElementById('thread');
  const intro = document.getElementById('intro');
  const chipsEl = document.getElementById('chips');
  const form = document.getElementById('askForm');
  const input = document.getElementById('askInput');

  function showChips(ids){
    chipsEl.innerHTML = '';
    ids.forEach(id => {
      const item = QA[id];
      if(!item) return;
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = item.q;
      btn.addEventListener('click', () => ask(id));
      chipsEl.appendChild(btn);
    });
  }

  function scrollToBottom(){
    thread.scrollTop = thread.scrollHeight;
    window.scrollTo(0, document.body.scrollHeight);
  }

  function addUserBubble(text){
    const row = document.createElement('div');
    row.className = 'bubble-row user';
    row.innerHTML = '<div class="bubble user"></div>';
    row.querySelector('.bubble').textContent = text;
    thread.appendChild(row);
    scrollToBottom();
  }

  function addAssistantBubble(item){
    const row = document.createElement('div');
    row.className = 'bubble-row';
    row.innerHTML = '<div class="avatar-sm">H</div><div class="bubble assistant"><span class="typing-dots"><span></span><span></span><span></span></span></div>';
    thread.appendChild(row);
    scrollToBottom();

    const bubble = row.querySelector('.bubble');

    setTimeout(() => {
      bubble.innerHTML = '';
      const textSpan = document.createElement('span');
      bubble.appendChild(textSpan);

      if(reduceMotion){
        textSpan.innerHTML = formatMarkdown(item.a);
        finishBubble(bubble, item);
        return;
      }

      const words = item.a.split(' ');
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      bubble.appendChild(cursor);

      const typer = setInterval(() => {
        textSpan.textContent += (i === 0 ? '' : ' ') + words[i];
        i++;
        scrollToBottom();
        if(i >= words.length){
          clearInterval(typer);
          cursor.remove();
          textSpan.innerHTML = formatMarkdown(item.a);
          finishBubble(bubble, item);
        }
      }, 32);
    }, reduceMotion ? 0 : 550);
  }

  function finishBubble(bubble, item){
    if(item.stat){
      const stat = document.createElement('div');
      stat.className = 'stat-line';
      stat.innerHTML = item.stat;
      bubble.appendChild(stat);
    }
    if(item.tags){
      const row = document.createElement('div');
      row.className = 'tag-row';
      item.tags.forEach(t => {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = t;
        row.appendChild(tag);
      });
      bubble.appendChild(row);
    }
    if(item.summary){
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.innerHTML = `
        <div class="srow"><span class="slabel">Role</span><span class="sval">Full Stack Developer (MERN) · AI &amp; GenAI Integration</span></div>
        <div class="srow"><span class="slabel">Location</span><span class="sval">Ahmedabad, Gujarat, India</span></div>
        <div class="srow"><span class="slabel">Experience</span><span class="sval">2+ years freelance</span></div>
        <div class="srow"><span class="slabel">Highlights</span><span class="sval">Aster Medcare (500+ daily checkups), Vercel static migrations</span></div>
        <div class="srow"><span class="slabel">Education</span><span class="sval">B.Tech CSE, Ganpat University — Expected 2027 (7th Sem)</span></div>
        <div class="srow"><span class="slabel">Contact</span><span class="sval"><a href="mailto:harshilnayee2004@gmail.com">Email</a> · <a href="https://www.linkedin.com/in/harshil-nayee-cse2004" target="_blank" rel="noopener">LinkedIn</a> · <a href="https://github.com/harshilnayee2004" target="_blank" rel="noopener">GitHub</a></span></div>
      `;
      bubble.appendChild(card);
    }
    scrollToBottom();
    showChips(item.next || []);
  }

  function ask(id){
    const item = QA[id];
    if(!item) return;
    intro.classList.add('hidden');
    addUserBubble(item.q);
    chipsEl.innerHTML = '';
    setTimeout(() => addAssistantBubble(item), 250);
  }

  function matchFreeText(text){
    const lower = text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g," ");
    let bestId = null;
    let maxScore = 0;
    for(const k of KEYWORDS){
      let score = 0;
      for(const word of k.keys) {
        if(lower.includes(word)) {
          score += 1;
          const regex = new RegExp('\\b' + word + '\\b', 'g');
          const matches = lower.match(regex);
          if (matches) {
            score += matches.length * 1.5;
          }
        }
      }
      if(score > maxScore){
        maxScore = score;
        bestId = k.id;
      }
    }
    return bestId;
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    intro.classList.add('hidden');
    addUserBubble(text);
    chipsEl.innerHTML = '';

    const matched = matchFreeText(text);
    if(matched){
      setTimeout(() => addAssistantBubble(QA[matched]), 250);
    } else {
      const fallbacks = [
        "Interesting query! I'm not fully briefed on that topic yet. Try asking about my **tech stack**, **work experience**, **projects**, or **internship status**!",
        "That's a bit beyond my portfolio scope. Feel free to ask about my MERN development, Aster Medcare checkups, or CCNA certification!",
        "Hmm, I didn't quite catch that. You can try asking about my certifications, Ganpat University education, or full-stack freelance history!",
        "Good question! I'm trained on Harshil's resume database. Try asking about his projects, skills, contact details, or resume summary!"
      ];
      const randomFallback = fallbacks[Math.floor(Math.random() * fallbacks.length)];
      setTimeout(() => addAssistantBubble({
        a: randomFallback,
        next: ["built","stack","intern","contact"]
      }), 250);
    }
  });

  // opening suggestions
  showChips(['built','stack','intern','contact']);
</script>

</body>
</html>
